<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ปาจื้อ ซาจู ดวงมงคล</title>
<style>
/* System fonts - works offline on iPad/iPhone */
@font-face{font-family:'CinzelFallback';src:local('Palatino'),local('Georgia'),local('serif')}
</style>
<style>
:root{
  --gold:#d4a843;--gold-l:#f0cc6a;--gold-d:#a07828;
  --red:#8b1a1a;--ink:#1a0000;--paper:#fdf5e4;
  --bg-main:#3d0000;--bg-card:rgba(255,255,255,0.04);
  --border-gold:rgba(212,168,67,0.3);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#2a0000;color:var(--paper);min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 20% 10%,rgba(180,20,20,0.6),transparent 55%),
    radial-gradient(ellipse at 80% 90%,rgba(100,0,0,0.7),transparent 55%),
    radial-gradient(ellipse at 50% 50%,rgba(60,0,0,0.3),transparent 70%),
    repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(212,168,67,.018) 60px),
    repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(212,168,67,.018) 60px)}
.wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:16px 20px 40px;background:rgba(40,0,0,.15);}

/* HEADER */
header{text-align:center;padding:32px 0 24px;position:relative}
.orn{color:var(--gold-l);letter-spacing:8px;opacity:.75;font-size:1.1rem}
h1{font-family:Georgia,'Palatino Linotype',serif;font-size:clamp(1.3rem,4vw,2.1rem);
   color:var(--gold-l);text-shadow:0 2px 24px rgba(212,168,67,.6),0 0 60px rgba(212,168,67,.2);letter-spacing:3px;margin:5px 0 3px}
.h1th{font-family:Georgia,'Times New Roman',serif;font-size:clamp(.9rem,2.5vw,1.25rem);color:var(--gold);opacity:.85;letter-spacing:4px;margin-bottom:5px}
.hline{width:160px;height:1px;margin:8px auto;background:linear-gradient(90deg,transparent,var(--gold-l),transparent)}

/* INPUT PANEL */
.panel{background:linear-gradient(135deg,rgba(245,237,216,.06),rgba(212,168,67,.04));
  border:1px solid rgba(212,168,67,.35);border-radius:4px;padding:20px 24px 16px;margin-bottom:20px;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.panel::before{content:'ใส่ข้อมูลวันเกิด';position:absolute;top:-11px;left:20px;
  background:#2a0000;color:var(--gold-l);font-family:Georgia,'Palatino Linotype',serif;
  font-size:.68rem;padding:1px 9px;border:1px solid rgba(212,168,67,.35)}
.igrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px 16px;margin-bottom:14px}
.ig label{display:block;font-size:.7rem;color:var(--gold);margin-bottom:3px;letter-spacing:1px;font-family:Georgia,'Times New Roman',serif}
.ig input,.ig select{width:100%;padding:7px 10px;background:rgba(0,0,0,.4);
  border:1px solid rgba(212,168,67,.28);border-radius:2px;color:var(--paper);
  font-family:'Helvetica Neue',Arial,sans-serif;font-size:.88rem;transition:border-color .18s}
.ig input:focus,.ig select:focus{outline:none;border-color:var(--gold)}
.ig select option{background:#2a0000}
.btn{display:block;width:100%;max-width:250px;margin:0 auto;padding:10px 26px;cursor:pointer;
  font-family:Georgia,'Times New Roman',serif;font-weight:600;font-size:.92rem;letter-spacing:2px;
  color:var(--ink);background:linear-gradient(135deg,var(--gold-l),var(--gold),var(--gold-d));
  border:none;border-radius:2px;
  box-shadow:0 3px 12px rgba(212,168,67,.28),inset 0 1px 0 rgba(255,255,255,.18);transition:all .18s}
.btn:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(212,168,67,.38)}

/* RESULTS */
#results{display:none;animation:fi .35s ease}
@keyframes fi{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.errmsg{color:#e05c5c;padding:12px;background:rgba(224,92,92,.1);border:1px solid rgba(224,92,92,.28);
  border-radius:3px;font-family:Georgia,'Times New Roman',serif;text-align:center}

/* SECTION LABEL */
.sec{font-family:Georgia,'Times New Roman',serif;font-size:.73rem;color:var(--gold);letter-spacing:3px;
  margin:22px 0 10px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(212,168,67,.4),transparent)}
.div{text-align:center;color:var(--gold);opacity:.3;letter-spacing:5px;font-size:.72rem;margin:12px 0}

/* ── 4-PILLAR CHART ── */
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:18px}
/* Always 4 columns — scale down text on small screens */
@media(max-width:600px){
  .pgrid{gap:4px}
  .pl-hd{font-size:.58rem;padding:3px 2px;letter-spacing:0}
  .pl-hs{padding:7px 3px 6px}
  .pl-hs .cn{font-size:1.3rem}
  .pl-hs .th{font-size:.58rem}
  .pl-hs .el{font-size:.52rem}
  .pl-eb{padding:7px 3px 6px}
  .pl-eb .cn{font-size:1.1rem}
  .pl-eb .th{font-size:.58rem}
  .pl-eb .an{font-size:.52rem}
  .hid-row span{font-size:.75rem!important}
  .pl-js{font-size:.52rem}
  .wrap{padding:10px 8px 30px}
}

.pillar{background:linear-gradient(180deg,rgba(212,168,67,.1),rgba(0,0,0,.45));
  border:1px solid rgba(212,168,67,.2);border-radius:3px;overflow:hidden}
.pl-hd{text-align:center;padding:4px 3px;background:rgba(212,168,67,.1);
  border-bottom:1px solid rgba(212,168,67,.16);font-size:.65rem;color:var(--gold);
  letter-spacing:1px;font-family:Georgia,'Times New Roman',serif}
.pl-hs{padding:11px 5px 9px;text-align:center;border-bottom:1px solid rgba(212,168,67,.1)}
.pl-hs .cn{font-size:1.9rem;line-height:1;display:block;text-shadow:0 2px 8px rgba(0,0,0,.45)}
.pl-hs .th{font-family:Georgia,'Times New Roman',serif;font-size:.7rem;opacity:.8;margin-top:2px;display:block}
.pl-hs .el{font-size:.6rem;opacity:.5;letter-spacing:.5px;display:block;margin-top:1px}
.pl-eb{padding:11px 5px 9px;text-align:center;border-bottom:1px solid rgba(212,168,67,.07)}
.pl-eb .cn{font-size:1.6rem;line-height:1;display:block}
.pl-eb .th{font-family:Georgia,'Times New Roman',serif;font-size:.68rem;display:block;margin-top:2px}
.pl-eb .an{font-size:.6rem;opacity:.5;display:block;margin-top:1px}
.pl-hid{padding:5px 4px;text-align:center;background:rgba(0,0,0,.18);
  font-size:.6rem;color:var(--paper);opacity:.58;min-height:28px;line-height:1.55}
.pl-js{padding:4px 4px;text-align:center;background:rgba(212,168,67,.04);
  border-top:1px dashed rgba(212,168,67,.1);font-size:.6rem;color:var(--gold-l);min-height:22px}
.hid-row{display:flex;align-items:center;padding:2px 0;font-family:'Noto Serif Thai',sans-serif;color:var(--paper)}

/* ELEMENT COLORS */
.ew{color:#72c96b}.ew2{color:#4ea847}
.ef{color:#e06060}.ef2{color:#c03030}
.ed{color:#c9a44a}.ed2{color:#a8832e}
.em{color:#aabcce}.em2{color:#7a8fa8}
.en{color:#6aaddb}.en2{color:#3a7db8}

/* ── INFO GRID ── */
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:9px;margin-bottom:16px}
.icard{background:rgba(255,255,255,.04);border:1px solid rgba(212,168,67,.2);border-radius:3px;padding:12px 14px}
.icard h4{font-family:Georgia,'Times New Roman',serif;font-size:.68rem;color:var(--gold);letter-spacing:2px;
  margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid rgba(212,168,67,.12)}
.irow{display:flex;justify-content:space-between;align-items:flex-start;
  padding:3px 0;font-size:.78rem;border-bottom:1px solid rgba(255,255,255,.04)}
.irow:last-child{border-bottom:none}
.ilbl{color:var(--paper);opacity:.48;flex-shrink:0;margin-right:6px}
.ival{font-family:Georgia,'Times New Roman',serif;text-align:right}
.hi{color:var(--gold-l)}


/* ── PROMPT GENERATOR ── */
.prompt-sec{margin-bottom:24px}
.prompt-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.ptab{padding:7px 16px;border:1px solid rgba(212,168,67,.3);background:rgba(212,168,67,.06);
  color:var(--gold);font-family:Georgia,'Times New Roman',serif;font-size:.75rem;letter-spacing:1px;
  border-radius:2px;cursor:pointer;transition:all .18s}
.ptab.active,.ptab:hover{background:rgba(212,168,67,.18);border-color:var(--gold)}
.pblock{display:none}
.pblock.show{display:block}
.pbox{background:rgba(0,0,0,.5);border:1px solid rgba(212,168,67,.25);border-radius:3px;
  padding:14px 16px;font-size:.78rem;line-height:1.75;color:var(--paper);
  font-family:'Helvetica Neue',Arial,sans-serif;white-space:pre-wrap;max-height:320px;overflow-y:auto;
  margin-bottom:8px}
.copy-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 18px;
  background:linear-gradient(135deg,var(--gold-l),var(--gold));
  color:var(--ink);border:none;border-radius:2px;font-family:Georgia,'Times New Roman',serif;
  font-size:.78rem;font-weight:600;cursor:pointer;letter-spacing:1px;transition:all .18s}
.copy-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(212,168,67,.3)}
.copy-btn.copied{background:linear-gradient(135deg,#6dbf67,#4ea847);color:#fff}





/* ── HOW TO USE ── */
.howto{background:linear-gradient(135deg,rgba(212,168,67,.08),rgba(0,0,0,.3));
  border:1px solid rgba(212,168,67,.3);border-radius:4px;padding:16px 20px;margin-bottom:14px}
.howto-title{font-family:Georgia,serif;font-size:.8rem;color:var(--gold-l);
  letter-spacing:2px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.howto-title::before{content:'';display:inline-block;width:16px;height:1px;background:var(--gold);opacity:.5}
.howto-title::after{content:'';display:inline-block;width:16px;height:1px;background:var(--gold);opacity:.5}
.howto-steps{display:flex;flex-direction:column;gap:7px}
.howto-step{display:flex;align-items:flex-start;gap:10px;font-size:.8rem;
  font-family:Georgia,serif;color:var(--paper);line-height:1.55}
.howto-num{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--gold-l),var(--gold));
  color:#1a0000;font-weight:700;font-size:.72rem;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px}
.howto-step .hl{color:var(--gold-l);font-weight:600}
.howto-step .dim{opacity:.6;font-size:.74rem}

/* ── SAVE IMAGE BUTTON ── */
.save-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;
  background:rgba(212,168,67,.15);border:1px solid rgba(212,168,67,.4);
  color:var(--gold);font-family:Georgia,serif;font-size:.68rem;letter-spacing:1px;
  border-radius:2px;cursor:pointer;transition:all .18s;margin-left:8px;vertical-align:middle}
.save-btn:hover{background:rgba(212,168,67,.28);border-color:var(--gold)}
.save-btn:active{transform:scale(.97)}
.save-wrap{position:relative}
.save-wrap .save-btn{position:absolute;right:0;top:-28px;z-index:10}

/* ── ZODIAC TABLE ── */
.zodiac-wrap{margin-bottom:16px}
.zodiac-row-label{font-size:.62rem;color:rgba(212,168,67,.65);letter-spacing:2px;margin-bottom:3px;font-family:Georgia,'Times New Roman',serif}
.zodiac-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:6px}
.zod{border-radius:4px;padding:7px 4px 6px;text-align:center;cursor:default;transition:transform .15s}
.zod:hover{transform:scale(1.04)}
.zod .zcn{font-size:1.1rem;display:block;line-height:1.2}
.zod .zth{font-family:Georgia,'Times New Roman',serif;font-size:.78rem;font-weight:600;display:block;margin-top:2px}
.zod .zan{font-size:.58rem;opacity:.7;display:block;margin-top:1px;letter-spacing:.5px}
.zod .zbadge{font-size:.5rem;display:block;margin-top:2px}

@keyframes goldpulse{
  0%,100%{box-shadow:0 4px 20px rgba(212,168,67,.55),0 0 40px rgba(212,168,67,.2),inset 0 1px 0 rgba(255,255,255,.4)}
  50%{box-shadow:0 6px 28px rgba(212,168,67,.8),0 0 60px rgba(212,168,67,.35),inset 0 1px 0 rgba(255,255,255,.4)}
}
/* ── VAYJORN TABLE ── */
.vt-wrap{overflow-x:auto;margin-bottom:20px;border:1px solid rgba(212,168,67,.18);border-radius:3px}
table.vt{width:100%;border-collapse:collapse;font-size:.76rem;min-width:600px}
table.vt th{padding:8px 8px;background:rgba(212,168,67,.15);border-bottom:2px solid rgba(212,168,67,.35);
  border-right:1px solid rgba(212,168,67,.12);color:var(--gold);
  font-family:Georgia,'Times New Roman',serif;font-weight:600;letter-spacing:.5px;text-align:center;white-space:nowrap}
table.vt td{padding:7px 8px;border-bottom:1px solid rgba(212,168,67,.09);
  border-right:1px solid rgba(212,168,67,.07);text-align:center;font-family:Georgia,'Times New Roman',serif}
table.vt tr:nth-child(even) td{background:rgba(212,168,67,.04)}
table.vt tr.now td{background:rgba(212,168,67,.18)}
table.vt tr.now td:first-child{border-left:3px solid var(--gold)}
.vt-cn{font-size:1.05rem;display:block;line-height:1.1}
.vt-th{font-size:.65rem;opacity:.75;display:block;margin-top:1px}
.vt-age{color:var(--gold-l);font-weight:600;font-size:.82rem}
.vt-yr{font-size:.62rem;opacity:.48;display:block;margin-top:1px}
.vt-js{font-size:.7rem}
.vt-jscn{font-size:.6rem;opacity:.55;display:block}


</style>
</head>
<body>
<div class="wrap">
<header>

    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:10px">

<script>
// ═══════════════════════════════════════════════════════
//  LOOKUP TABLES — verified against Excel BAZI_Date_Selection168_V1
// ═══════════════════════════════════════════════════════
const H={
  1:{th:'กะ',   el:'ไม้+',cn:'甲',c:'ew'},  2:{th:'อิก',  el:'ไม้-',cn:'乙',c:'ew2'},
  3:{th:'เปี้ย',el:'ไฟ+',cn:'丙',c:'ef'},  4:{th:'เต็ง', el:'ไฟ-',cn:'丁',c:'ef2'},
  5:{th:'โบ่ว', el:'ดิน+',cn:'戊',c:'ed'}, 6:{th:'กี้',  el:'ดิน-',cn:'己',c:'ed2'},
  7:{th:'แก',   el:'ทอง+',cn:'庚',c:'em'}, 8:{th:'ซิง',  el:'ทอง-',cn:'辛',c:'em2'},
  9:{th:'หยิ่ม',el:'น้ำ+',cn:'壬',c:'en'},10:{th:'กุ่ย', el:'น้ำ-',cn:'癸',c:'en2'}
};
const E={
  1:{th:'จื้อ', an:'ชวด',  el:'น้ำ+',cn:'子',c:'en'},
  2:{th:'ทิ่ว', an:'ฉลู',  el:'ดิน-',cn:'丑',c:'ed2'},
  3:{th:'อิ๊ง', an:'ขาล',  el:'ไม้+',cn:'寅',c:'ew'},
  4:{th:'เบ้า', an:'เถาะ', el:'ไม้-',cn:'卯',c:'ew2'},
  5:{th:'ซิ้ง', an:'มะโรง',el:'ดิน+',cn:'辰',c:'ed'},
  6:{th:'จี๋',  an:'มะเส็ง',el:'ไฟ-',cn:'巳',c:'ef2'},
  7:{th:'โง่ว', an:'มะเมีย',el:'ไฟ+',cn:'午',c:'ef'},
  8:{th:'บี่',  an:'มะแม', el:'ดิน-',cn:'未',c:'ed2'},
  9:{th:'ซิม',  an:'วอก',  el:'ทอง+',cn:'申',c:'em'},
 10:{th:'อิ้ว', an:'ระกา', el:'ทอง-',cn:'酉',c:'em2'},
 11:{th:'สุก',  an:'จอ',   el:'ดิน+',cn:'戌',c:'ed'},
 12:{th:'ไห',   an:'กุน',  el:'น้ำ-',cn:'亥',c:'en2'}
};

// Hidden stems [main, 2nd, 3rd]
const HIDDEN={
  1:[9],2:[6,1,7],3:[5,3,7],4:[2],5:[5,2,8],6:[4,3,1],
  7:[4],8:[6,2,4],9:[7,9,5],10:[8],11:[5,7,3],12:[9,5]
};

// Lamda boundaries per calendar month
// Lamda boundary per calendar month [big, small]
// L values are in 0.79–1.79 range (months 1–2 = 0.7x, months 3–12 = 1.0x–1.7x)
// BUG FIX: month 3 small = 1.0 exactly (360°/360 = 1.0, NOT 360/360+1 = 2.0)
const LREF=[
  [285/360,    300/360  ],  // mo 1  big=0.7917 sml=0.8333
  [315/360,    330/360  ],  // mo 2  big=0.8750 sml=0.9167
  [345/360,    1.0      ],  // mo 3  big=0.9583 sml=1.0000  ← fixed
  [15/360+1,   30/360+1 ],  // mo 4  big=1.0417 sml=1.0833
  [45/360+1,   60/360+1 ],  // mo 5  big=1.1250 sml=1.1667
  [75/360+1,   90/360+1 ],  // mo 6  big=1.2083 sml=1.2500
  [105/360+1, 120/360+1 ],  // mo 7  big=1.2917 sml=1.3333
  [135/360+1, 150/360+1 ],  // mo 8  big=1.3750 sml=1.4167
  [165/360+1, 180/360+1 ],  // mo 9  big=1.4583 sml=1.5000
  [195/360+1, 210/360+1 ],  // mo 10 big=1.5417 sml=1.5833
  [225/360+1, 240/360+1 ],  // mo 11 big=1.6250 sml=1.6667
  [255/360+1, 270/360+1 ],  // mo 12 big=1.7083 sml=1.7500
];

// Hour → ยาม lookup (from Cal8Yee B66:C89)
const YMAP={0:1,1:2,2:2,3:3,4:3,5:4,6:4,7:5,8:5,9:6,10:6,11:7,12:7,
            13:8,14:8,15:9,16:9,17:10,18:10,19:11,20:11,21:12,22:12,23:1};

// ═══════════════════════════════════════════════════════
//  MATH HELPERS
// ═══════════════════════════════════════════════════════
const EXCEL_BASE=2415018.5, JD_1990=2447891.5, DPLU=1/0.00281547942;
const rad=d=>d*Math.PI/180;
function m10(x){return((x-1)%10+10)%10+1}
function m12(x){return((x-1)%12+12)%12+1}

function toJD(y,m,d,h=12,mn=0){
  let d2=d+h/24+mn/1440; if(m<=2){y--;m+=12;}
  const A=Math.trunc(y/100),B=2-A+Math.trunc(A/4);
  return Math.trunc(365.25*(y+4716))+Math.trunc(30.6001*(m+1))+d2+B-1524.5;
}

// Compute L = (Ec+N+279.403303)/360 matching Excel L122/L61
// H = excel_serial + EXCEL_BASE - JD_1990 - TIME(6,18,0)
function computeL(excelSerial){
  const dayNum = excelSerial + EXCEL_BASE - JD_1990 - (6/24+18/1440);
  const T=(JD_1990-2415020)/36524.25;
  const Eg=(279.6966778+36000.76892*T+0.0003025*T*T)%360;
  const Wg=(281.2208444+1.719175*T+0.000452778*T*T)%360;
  const e =0.01675104-0.0000418*T-0.000000126*T*T;
  const N =((360/365.242191*dayNum)%360+360)%360;
  const Mo=((N+Eg-Wg)%360+360)%360;
  const Ec=(360/Math.PI)*e*Math.sin(rad(Mo));
  return (Ec+N+279.403303)/360;
}

// JD ↔ Excel serial
const jd2ex=jd=>jd-EXCEL_BASE;
const ex2jd=s=>s+EXCEL_BASE;

function jd2date(jd){
  const z=Math.floor(jd+.5),f=(jd+.5)-z;
  let A=z; if(z>=2299161){const a=Math.floor((z-1867216.25)/36524.25);A=z+1+a-Math.floor(a/4);}
  const B=A+1524,C=Math.floor((B-122.1)/365.25),D=Math.floor(365.25*C);
  const E2=Math.floor((B-D)/30.6001);
  const dy=B-D-Math.floor(30.6001*E2);
  const mo=E2<14?E2-1:E2-13,yr=mo>2?C-4716:C-4715;
  const mn2=Math.round((jd+.5-Math.floor(jd+.5))*1440);
  return{y:yr,mo,d:dy,h:Math.floor(mn2/60)%24,m:mn2%60};
}
function fmtDate(jd){
  const d=jd2date(jd);
  const M=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return`${d.d} ${M[d.mo-1]} ${d.y+543} ${String(d.h).padStart(2,'0')}:${String(d.m).padStart(2,'0')} น.`;
}

// ═══════════════════════════════════════════════════════
//  FOUR PILLARS
// ═══════════════════════════════════════════════════════
function yearPillar(yr,L){
  const springSml=LREF[2][1]; // month 3 small = 1.0
  const adjY=L>=springSml?yr:yr-1;
  return{stem:m10(adjY-3),branch:m12(adjY+9),adjY};
}

function monthPillar(calMon,L,yearStem){
  const[lamBig]=LREF[calMon-1];
  const E124=L>=lamBig?0:-1;
  const E125=calMon+E124-1;  // solar month -1
  const branch=m12(E125+2);
  const ye=yearStem>5?yearStem-5:yearStem;
  const j123=[3,5,7,9,1][ye-1];
  const brAdj=branch-3<0?12+branch-3:branch-3;
  return{stem:m10(brAdj+j123),branch,solarMonth:E125};
}

function dayPillar(yr,mo,d,h){
  // Use Math.floor (not Math.round) — jd noon can be exactly .5 which JS rounds up wrongly
  const ex=Math.floor(jd2ex(toJD(yr,mo,d,12,0)));
  const t=h>=23?1:0;
  const O=ex-4384+t;
  const br=(O%12+12)%12+1;
  return{stem:m10(O+3),branch:br===0?12:br};
}

function hourPillar(dayStem,h){
  const branch=h>=23||h<1?1:h<3?2:h<5?3:h<7?4:h<9?5:h<11?6:h<13?7:h<15?8:h<17?9:h<19?10:h<21?11:12;
  const yam=YMAP[h];
  const de=dayStem>5?dayStem-5:dayStem;
  const S125=[1,3,5,7,9][de-1];
  return{stem:m10(S125+yam-1),branch,yam};
}

// Siangsae (12 growth phases) — verified against Excel Cal8Yee
// Key: always compare dayStem vs targetBranch
// Starting branch (長生/Growth) per heavenly stem:
//   甲1=亥12, 乙2=午7, 丙3=寅3, 丁4=酉10
//   戊5=寅3,  己6=酉10, 庚7=巳6, 辛8=子1, 壬9=申9, 癸10=卯4
const SS_START={1:12,2:7,3:3,4:10,5:3,6:10,7:6,8:1,9:9,10:4};
function siangsae(dayStem,branch){
  const s=SS_START[dayStem];
  return((branch-s+12)%12)+1;
}

// Ten Gods helpers
function js(ds,os){return JM[ds-1][os-1]||null;}
function jsE(ds,br){const m=HIDDEN[br][0];return m?js(ds,m):null;}
function jsStr(i){return i?JN[i].th:'';}

// ═══════════════════════════════════════════════════════
//  VAYJORN 大運
// ═══════════════════════════════════════════════════════
function vayjorn(mStem,mBranch,dir,startAge,n=8){
  const out=[];
  let s=mStem,b=mBranch;
  for(let i=0;i<n;i++){
    s=m10(s+dir);b=m12(b+dir);
    out.push({stem:s,branch:b,age:Math.round(startAge)+i*10});
  }
  return out;
}

// Tab switching
function switchTab(idx){
  document.querySelectorAll('.ptab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.pblock').forEach((b,i)=>b.classList.toggle('show',i===idx));

// Copy prompt
function copyPrompt(idx){
  const text = window._prompts?.[idx]?.text||'';
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById(`copybtn-${idx}`);
    btn.textContent='✓ Copied!';
    btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='⊕ Copy Prompt';btn.classList.remove('copied');},2000);
  }).catch(()=>{
    // fallback
    const ta=document.createElement('textarea');
    ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    const btn=document.getElementById(`copybtn-${idx}`);
    btn.textContent='✓ Copied!'; btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='⊕ Copy Prompt';btn.classList.remove('copied');},2000);
  });
}


// ─── Save ALL 4 sections as one tall image ───
function saveAll(){
  const ids = ['sec-pillars','sec-transit','sec-zodiac','sec-vayjorn'];
  const sections = ids.map(id=>document.getElementById(id)).filter(Boolean);
  if(sections.length===0){alert('ยังไม่มีข้อมูล กรุณาคำนวณก่อน');return;}

  const btn = document.getElementById('saveall-btn');
  if(btn){btn.textContent='⏳ กำลังสร้างภาพ...';btn.disabled=true;}

  const dd=document.getElementById('dd').value;
  const mm=document.getElementById('mm').value;
  const yy=document.getElementById('yy').value;
  const fname='ดวงชะตา_'+dd+'-'+mm+'-'+yy+'.png';

  // Save original overflow
  const origOverflows = sections.map(el=>el.style.overflowX);
  sections.forEach(el=>{el.style.overflowX='visible';});

  const scale = 2;
  const padding = 24;

  Promise.all(sections.map(el=>
    html2canvas(el,{
      backgroundColor:'#2a0000',
      scale:scale,
      useCORS:true,
      logging:false,
      windowWidth: Math.max(el.scrollWidth+40, 800)
    })
  )).then(function(canvases){
    // Restore overflow
    sections.forEach((el,i)=>{el.style.overflowX=origOverflows[i];});

    // Get section labels
    const labels = ['四柱命盤 สี่เสาดวงชะตา','流年流月 ดวงจร','十二地支 นักษัตร','大運 ถนนสิบปี'];
    const labelH = 36 * scale;
    const gap = 16 * scale;
    const pad = padding * scale;

    const totalW = Math.max(...canvases.map(c=>c.width)) + pad*2;
    const totalH = canvases.reduce((sum,c)=>sum+c.height+labelH+gap,0) + pad*2 + gap;

    const merged = document.createElement('canvas');
    merged.width = totalW;
    merged.height = totalH;
    const ctx = merged.getContext('2d');

    // Background
    ctx.fillStyle = '#2a0000';
    ctx.fillRect(0,0,totalW,totalH);

    // Header
    ctx.fillStyle = '#d4a843';
    ctx.font = 'bold '+(18*scale)+'px Georgia,serif';
    ctx.textAlign = 'center';
    ctx.fillText('ปาจื้อ ซาจู · ดวงมงคล  — '+dd+'/'+mm+'/'+yy+' พ.ศ.', totalW/2, pad*0.8);

    // Gold divider line
    ctx.strokeStyle = 'rgba(212,168,67,0.4)';
    ctx.lineWidth = scale;
    ctx.beginPath();
    ctx.moveTo(pad,pad);
    ctx.lineTo(totalW-pad,pad);
    ctx.stroke();

    let y = pad + gap;
    canvases.forEach(function(canvas,i){
      // Section label
      ctx.fillStyle = 'rgba(212,168,67,0.7)';
      ctx.font = (12*scale)+'px Georgia,serif';
      ctx.textAlign = 'left';
      ctx.fillText(labels[i], pad, y + labelH*0.7);
      y += labelH;

      // Draw section canvas
      ctx.drawImage(canvas, pad, y);
      y += canvas.height + gap;

      // Separator line
      if(i < canvases.length-1){
        ctx.strokeStyle = 'rgba(212,168,67,0.2)';
        ctx.lineWidth = scale*0.5;
        ctx.beginPath();
        ctx.moveTo(pad, y-gap/2);
        ctx.lineTo(totalW-pad, y-gap/2);
        ctx.stroke();
      }
    });

    // Footer
    ctx.fillStyle = 'rgba(212,168,67,0.5)';
    ctx.font = (10*scale)+'px Georgia,serif';
    ctx.textAlign = 'center';
    ctx.fillText('โดยซินแสนัท · LINE @Royalnumber789', totalW/2, totalH-pad*0.5);

    if(btn){btn.textContent='📥 บันทึกดวงทั้งหมด';btn.disabled=false;}

    const link=document.createElement('a');
    link.download=fname;
    link.href=merged.toDataURL('image/png');
    link.click();
  }).catch(function(e){
    sections.forEach((el,i)=>{el.style.overflowX=origOverflows[i];});
    if(btn){btn.textContent='📥 บันทึกดวงทั้งหมด';btn.disabled=false;}
    alert('เกิดข้อผิดพลาด: '+e.message);
  });
}
